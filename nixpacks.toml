providers = ['node']

[phases.setup]
nixPkgs = ['nodejs_20', 'curl']

[phases.install]
cmds = ['npm ci']

[phases.build]
cmds = ['npm run build']

[start]
cmd = 'npx serve -s dist -l 8080 --config serve.json'

[healthcheck]
cmd = 'curl -f http://localhost:8080/ || exit 1'
interval = '30s'
timeout = '5s'
startPeriod = '10s'

[variables]
NODE_ENV = 'production'
PORT = '8080'
